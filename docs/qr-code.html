<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עמלי - QR Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Alef', -apple-system, sans-serif;
      background: #F0F0F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Ticket shell ───────────────────────────────────── */
    .ticket {
      display: flex;
      flex-direction: row;
      direction: ltr;
      width: 680px;
      height: 240px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.13);
    }

    /* ── Left: branded panel ────────────────────────────── */
    .ticket-brand {
      width: 230px;
      flex-shrink: 0;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-logo {
      max-width: 100%;
      max-height: 100px;
      object-fit: contain;
      display: block;
    }

    /* ── Dashed separator ───────────────────────────────── */
    .ticket-sep {
      width: 1px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(32, 80, 130, 0.2) 0px,
        rgba(32, 80, 130, 0.2) 6px,
        transparent 6px,
        transparent 12px
      );
      margin: 0;
      flex-shrink: 0;
      position: relative;
    }

    /* Notch circles at top and bottom of separator */
    .ticket-sep::before,
    .ticket-sep::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #F0F0F0;
    }
    .ticket-sep::before { top: -10px; }
    .ticket-sep::after  { bottom: -10px; }

    /* ── Right: QR panel ────────────────────────────────── */
    .ticket-qr {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px 32px;
    }

#qr-container canvas,
    #qr-container img {
      border-radius: 8px;
      display: block;
    }

    /* ── Print ──────────────────────────────────────────── */
    @media print {
      @page { size: 20cm 8cm; margin: 0; }

      body {
        background: #fff;
        min-height: auto;
        padding: 0;
        display: block;
      }

      .ticket {
        width: 20cm;
        height: 8cm;
        border-radius: 0;
        box-shadow: none;
      }

      .ticket-sep::before,
      .ticket-sep::after {
        background: #fff;
      }
    }
  </style>
</head>
<body>

  <div class="ticket">

    <!-- Left: brand -->
    <div class="ticket-brand">
      <img src="logo.svg" alt="עמלי" class="brand-logo">
    </div>

    <!-- Separator -->
    <div class="ticket-sep"></div>

    <!-- Right: QR -->
    <div class="ticket-qr">
      <div id="qr-container"></div>
    </div>

  </div>

  <script>
    new QRCode(document.getElementById("qr-container"), {
      text: "https://aviadvir123.github.io/amali-cards/",
      width: 160,
      height: 160,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
