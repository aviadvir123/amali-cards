<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עמלי - QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #F5F5F5;
    }

    .qr-card {
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 48px 40px 52px;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }

    .shop-name {
      font-size: 2.42rem;
      font-weight: 700;
      color: rgb(32, 80, 130);
      margin-bottom: 6px;
    }

    .shop-subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgb(32, 80, 130);
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: rgba(32, 80, 130, 0.2);
      margin: 28px auto;
    }

    .qr-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: rgb(32, 80, 130);
      margin-bottom: 6px;
    }

    .qr-subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgb(32, 80, 130);
      opacity: 0.65;
      margin-bottom: 28px;
    }

    #qr-container {
      display: flex;
      justify-content: center;
    }

    #qr-container canvas,
    #qr-container img {
      border-radius: 10px;
    }

    .qr-social {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-top: 1px solid rgba(32, 80, 130, 0.12);
      padding-top: 16px;
    }

.qr-social-links {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .qr-social-link {
      color: rgb(32, 80, 130);
      opacity: 0.35;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-social-link:hover {
      opacity: 0.75;
    }

    @media print {
      body {
        background: #FFFFFF;
        min-height: auto;
      }

      .qr-card {
        box-shadow: none;
        border: 2px solid rgb(32, 80, 130);
        max-width: none;
        width: 10cm;
        padding: 1.5cm 1.2cm;
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="qr-card">
    <h1 class="shop-name">עמלי</h1>
    <p class="shop-subtitle">عملي &nbsp;·&nbsp; Amali</p>

    <div class="divider"></div>

    <p class="qr-title">כרטיס ניקוב דיגיטלי</p>
    <p class="qr-subtitle">קפה עשירי חינם :)</p>

    <div id="qr-container"></div>

    <div class="qr-social">
      <div class="qr-social-links">
        <a href="https://maps.app.goo.gl/fThepLFqVYa66BPf9" target="_blank" rel="noopener" aria-label="Google Maps" class="qr-social-link">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
        </a>
        <a href="https://www.instagram.com/amali.roasters/?hl=he" target="_blank" rel="noopener" aria-label="Instagram" class="qr-social-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4.5"/>
            <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
          </svg>
        </a>
        <a href="https://www.facebook.com/p/Amali-Roasters-61577075330664/" target="_blank" rel="noopener" aria-label="Facebook" class="qr-social-link">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <script>
    new QRCode(document.getElementById("qr-container"), {
      text: "https://aviadvir123.github.io/amali-cards/",
      width: 220,
      height: 220,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
