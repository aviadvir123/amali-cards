<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>עמלי - QR Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Alef', -apple-system, sans-serif;
      background: #F5F5F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 40px 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #qr-container canvas,
    #qr-container img {
      border-radius: 10px;
      display: block;
    }

    .tagline {
      font-size: 1.1rem;
      font-weight: 700;
      color: rgb(32, 80, 130);
      opacity: 0.7;
    }

    .print-btn {
      margin-top: 8px;
      padding: 10px 32px;
      border: 2px solid rgb(32, 80, 130);
      border-radius: 10px;
      background: transparent;
      color: rgb(32, 80, 130);
      font-family: 'Alef', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s;
    }

    .print-btn:hover { opacity: 1; }

    @media print {
      @page { size: 10cm 12cm; margin: 0; }
      body { background: #fff; }
      .card {
        box-shadow: none;
        border: none;
        padding: 1cm;
        width: 10cm;
        height: 12cm;
        justify-content: center;
      }
      .print-btn { display: none; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div id="qr-container"></div>
    <p class="tagline">עשירי עלינו :)</p>
    <button class="print-btn" onclick="window.print()">הדפסה</button>
  </div>

  <script>
    new QRCode(document.getElementById("qr-container"), {
      text: "https://aviadvir123.github.io/amali-cards/",
      width: 220,
      height: 220,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
